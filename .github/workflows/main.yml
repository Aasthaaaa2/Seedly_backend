name : SeedlyDeployment
on :
  push :
    branches :
      - main
jobs :
  Deploy_Backend :
    runs-on : ubuntu-latest
    steps :
      - name : gitcode
        uses : actions/checkout@v4
      - name : connection
        uses : appleboy/ssh-action@v1.2.0

        with : 
          host : ${{secrets.IP}}
          username : ${{secrets.USERNAME}}
          key : ${{secrets.key}}

          script : |
            cd /home/ubuntu/Seedly_backend
            git pull origin main
            sudo npm install
            pm2 restart Backend || pm2 start index.js --name "Backend"
            pm2 save
        
